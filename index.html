<!DOCTYPE html>
<html lang="ja">
<head>

    <link rel="icon" href="https://raw.githubusercontent.com/cocomeda/Calc/main/favicon.jpg" type="image/x-icon">

  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速計算トレーニング</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 10px; }
        .card { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* ディスプレイエリア */
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .display-area { font-size: 3.5rem; font-weight: bold; margin: 15px 0; min-height: 80px; color: var(--primary); }
        #answer-display { font-size: 2.5rem; color: #555; height: 1.2em; border-bottom: 3px solid #ddd; margin-bottom: 20px; }

        /* 設定エリア */
        .settings { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; text-align: left; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        input[type="number"] { width: 50px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; }

        /* テンキー */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .key { padding: 20px; font-size: 1.5rem; background: white; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.1s; }
        .key:active { background: #e0e0e0; transform: scale(0.95); }
        .key.clear { background: #fff3f3; color: var(--danger); }
        .key.zero { grid-column: span 2; }

        .hidden { display: none; }
        button#startBtn { width: 100%; padding: 15px; font-size: 1.2rem; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="info-bar">
        <div id="timer">Time: 0.0s</div>
        <div id="progress">1 / 10</div>
    </div>

    <div id="game-view" class="hidden">
        <div class="display-area" id="question">---</div>
        <div id="answer-display"></div>
        
        <div class="keypad">
            <button class="key" onclick="inputNum(7)">7</button>
            <button class="key" onclick="inputNum(8)">8</button>
            <button class="key" onclick="inputNum(9)">9</button>
            <button class="key" onclick="inputNum(4)">4</button>
            <button class="key" onclick="inputNum(5)">5</button>
            <button class="key" onclick="inputNum(6)">6</button>
            <button class="key" onclick="inputNum(1)">1</button>
            <button class="key" onclick="inputNum(2)">2</button>
            <button class="key" onclick="inputNum(3)">3</button>
            <button class="key zero" onclick="inputNum(0)">0</button>
            <button class="key clear" onclick="clearAns()">C</button>
        </div>
    </div>

    <div id="setup-view">
        <div class="settings">
            <div class="setting-row">
                <span>演算:</span>
                <select id="opSelect">
                    <option value="mul">掛け算 (×)</option>
                    <option value="add">足し算 (+)</option>
                    <option value="sub">引き算 (-)</option>
                    <option value="div">割り算 (÷)</option>
                </select>
            </div>
            <div class="setting-row">
                <span>数値1の範囲 (例:10〜99):</span>
                <div>
                    <input type="number" id="n1Min" value="10"> 〜 <input type="number" id="n1Max" value="99">
                </div>
            </div>
            <div class="setting-row">
                <span>数値2の範囲 (例:2〜9):</span>
                <div>
                    <input type="number" id="n2Min" value="2"> 〜 <input type="number" id="n2Max" value="9">
                </div>
            </div>
            <div class="setting-row">
                <span>問題数:</span>
                <input type="number" id="totalCount" value="10">
            </div>
        </div>
        <button id="startBtn" onclick="startGame()">スタート！</button>
        <p id="bestScore" style="margin-top:15px; font-weight:bold; color:#666;"></p>
    </div>
</div>

<script>
    let currentAns = "";
    let correctAns = 0;
    let count = 0;
    let totalQuestions = 10;
    let startTime;
    let timerInterval;

    function startGame() {
        totalQuestions = parseInt(document.getElementById('totalCount').value);
        count = 0;
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 100);
        nextQuestion();
    }

    function updateTimer() {
        const diff = (Date.now() - startTime) / 1000;
        document.getElementById('timer').innerText = `Time: ${diff.toFixed(1)}s`;
    }

    function nextQuestion() {
        count++;
        if (count > totalQuestions) {
            finishGame();
            return;
        }
        document.getElementById('progress').innerText = `${count} / ${totalQuestions}`;
        currentAns = "";
        updateAnsDisplay();

        const op = document.getElementById('opSelect').value;
        const n1 = rand(parseInt(document.getElementById('n1Min').value), parseInt(document.getElementById('n1Max').value));
        const n2 = rand(parseInt(document.getElementById('n2Min').value), parseInt(document.getElementById('n2Max').value));

        let qText = "";
        if (op === 'mul') { qText = `${n1} × ${n2}`; correctAns = n1 * n2; }
        else if (op === 'add') { qText = `${n1} + ${n2}`; correctAns = n1 + n2; }
        else if (op === 'sub') { 
            let a = Math.max(n1, n2), b = Math.min(n1, n2);
            qText = `${a} - ${b}`; correctAns = a - b; 
        }
        else if (op === 'div') {
            // 割り切れる問題を生成
            let targetAns = n1; 
            let divisor = n2;
            let dividend = targetAns * divisor;
            qText = `${dividend} ÷ ${divisor}`; correctAns = targetAns;
        }

        document.getElementById('question').innerText = qText;
    }

    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function inputNum(num) {
        currentAns += num.toString();
        updateAnsDisplay();
        // 入力した瞬間に判定（桁数が一致するか、正解と同じになれば次へ）
        if (parseInt(currentAns) === correctAns) {
            setTimeout(nextQuestion, 100); // 正解時に一瞬待つ
        } else if (currentAns.length >= correctAns.toString().length && parseInt(currentAns) !== correctAns) {
            // 桁数が正解と同じなのに間違っている場合は赤くするなどの演出
            document.getElementById('answer-display').style.color = 'red';
        }
    }

    function clearAns() {
        currentAns = "";
        updateAnsDisplay();
    }

    function updateAnsDisplay() {
        const display = document.getElementById('answer-display');
        display.innerText = currentAns;
        display.style.color = '#555';
    }

    function finishGame() {
        clearInterval(timerInterval);
        const finalTime = (Date.now() - startTime) / 1000;
        alert(`終了！タイム: ${finalTime.toFixed(2)}秒`);
        
        document.getElementById('setup-view').classList.remove('hidden');
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('bestScore').innerText = `前回のスコア: ${finalTime.toFixed(2)}秒 (${totalQuestions}問)`;
    }

    // キーボード入力にも対応
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('game-view').classList.contains('hidden')) return;
        if (e.key >= '0' && e.key <= '9') inputNum(e.key);
        if (e.key === 'Backspace' || e.key === 'c') clearAns();
    });
</script>

</body>
</html>
